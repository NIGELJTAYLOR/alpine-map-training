<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>PerformOS favicon SVG preview</title>
<style>
  body { font-family: Arial, sans-serif; margin: 32px; background: #f5f5f5; color: #111; }
  .grid { display: grid; grid-template-columns: repeat(3, 220px); gap: 24px; align-items: start; }
  .card { background: white; padding: 18px; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.08); }
  .checker { background-image: linear-gradient(45deg,#ddd 25%,transparent 25%),linear-gradient(-45deg,#ddd 25%,transparent 25%),linear-gradient(45deg,transparent 75%,#ddd 75%),linear-gradient(-45deg,transparent 75%,#ddd 75%); background-size: 20px 20px; background-position: 0 0,0 10px,10px -10px,-10px 0px; padding: 20px; border-radius: 10px; }
  img { width: 128px; height: 128px; display: block; margin: 0 auto; }
  p { font-size: 13px; line-height: 1.4; margin-bottom: 0; word-break: break-word; }
</style>
</head>
<body>
<h1>PerformOS favicon SVG preview</h1>
<div class="grid">
  <div class="card"><div class="checker"><img src="performos-favicon.svg"></div><p>performos-favicon.svg</p></div>
  <div class="card"><div class="checker"><img src="performos-favicon-transparent-white.svg"></div><p>performos-favicon-transparent-white.svg</p></div>
  <div class="card"><div class="checker"><img src="performos-favicon-transparent-black.svg"></div><p>performos-favicon-transparent-black.svg</p></div>
</div>
</body>
</html>
