<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="480" fill="#fafaf5"/>
  <text x="20" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000">Reading a four-figure grid reference</text>
  <text x="20" y="45" font-family="Arial, sans-serif" font-size="10" fill="#444">Along the corridor, then up the stairs: eastings first (left to right), northings second (bottom to top).</text>
  <rect x="100" y="80" width="320" height="320" fill="#fff" stroke="#888" stroke-width="0.6"/>
  <line x1="100" y1="80" x2="100" y2="400" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="180" y1="80" x2="180" y2="400" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="260" y1="80" x2="260" y2="400" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="340" y1="80" x2="340" y2="400" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="420" y1="80" x2="420" y2="400" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="100" y1="80" x2="420" y2="80" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="100" y1="160" x2="420" y2="160" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="100" y1="240" x2="420" y2="240" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="100" y1="320" x2="420" y2="320" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="100" y1="400" x2="420" y2="400" stroke="#1a1a1a" stroke-width="0.8"/>
  <text x="100" y="425" font-family="Arial, sans-serif" font-size="11" fill="#000" text-anchor="middle">11</text>
  <text x="180" y="425" font-family="Arial, sans-serif" font-size="11" fill="#000" text-anchor="middle">12</text>
  <text x="260" y="425" font-family="Arial, sans-serif" font-size="11" fill="#000" text-anchor="middle">13</text>
  <text x="340" y="425" font-family="Arial, sans-serif" font-size="11" fill="#000" text-anchor="middle">14</text>
  <text x="420" y="425" font-family="Arial, sans-serif" font-size="11" fill="#000" text-anchor="middle">15</text>
  <text x="260" y="445" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000" text-anchor="middle">eastings (along the corridor)</text>
  <text x="92" y="404" font-family="Arial, sans-serif" font-size="11" fill="#000" text-anchor="end">63</text>
  <text x="92" y="324" font-family="Arial, sans-serif" font-size="11" fill="#000" text-anchor="end">64</text>
  <text x="92" y="244" font-family="Arial, sans-serif" font-size="11" fill="#000" text-anchor="end">65</text>
  <text x="92" y="164" font-family="Arial, sans-serif" font-size="11" fill="#000" text-anchor="end">66</text>
  <text x="92" y="84" font-family="Arial, sans-serif" font-size="11" fill="#000" text-anchor="end">67</text>
  <text x="40" y="245" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000" transform="rotate(-90 40 245)" text-anchor="middle">northings (up the stairs)</text>
  <rect x="260" y="240" width="80" height="80" fill="#fff4d6" stroke="#d4a23a" stroke-width="1.6"/>
  <rect x="290" y="270" width="14" height="10" fill="#1a1a1a"/>
  <text x="310" y="280" font-family="Arial, sans-serif" font-size="9" fill="#000">hut</text>
  <text x="300" y="288" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="#d4a23a" opacity="0.18" text-anchor="middle">1363</text>
  <line x1="260" y1="320" x2="260" y2="408" stroke="#d32f2f" stroke-width="1.4"/>
  <text x="260" y="460" font-family="Arial, sans-serif" font-size="10" fill="#d32f2f" font-weight="bold" text-anchor="middle">read this easting first: 13</text>
  <line x1="100" y1="320" x2="92" y2="320" stroke="#d32f2f" stroke-width="1.4"/>
  <text x="105" y="338" font-family="Arial, sans-serif" font-size="10" fill="#d32f2f" font-weight="bold">then northing: 63</text>
  <text x="450" y="105" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#000">Worked example</text>
  <text x="450" y="135" font-family="Arial, sans-serif" font-size="11" fill="#000">The hut sits in the square</text>
  <text x="450" y="152" font-family="Arial, sans-serif" font-size="11" fill="#000">right of easting 13,</text>
  <text x="450" y="169" font-family="Arial, sans-serif" font-size="11" fill="#000">above northing 63.</text>
  <text x="450" y="200" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#d32f2f">Grid ref: 1363</text>
  <text x="450" y="230" font-family="Arial, sans-serif" font-size="10" fill="#444">A four-figure grid reference</text>
  <text x="450" y="245" font-family="Arial, sans-serif" font-size="10" fill="#444">identifies a whole square,</text>
  <text x="450" y="260" font-family="Arial, sans-serif" font-size="10" fill="#444">not an exact point.</text>
</svg>
