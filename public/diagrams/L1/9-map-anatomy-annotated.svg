<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="480" fill="#fafaf5"/>
  <text x="20" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000">The parts of a topographic map</text>
  <text x="20" y="45" font-family="Arial, sans-serif" font-size="10" fill="#444">Every alpine map sheet has the same five core elements: title, scale, legend, north arrow, grid. Find each one before you start using the map.</text>

  <!-- Outer map sheet -->
  <rect x="30" y="70" width="450" height="380" fill="#ffffff" stroke="#1a1a1a" stroke-width="1.4"/>

  <!-- Top title strip -->
  <rect x="30" y="70" width="450" height="34" fill="#2b4a6b"/>
  <text x="42" y="92" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#fff">Les Trois Vall&#233;es &#8212; Modane</text>
  <text x="468" y="92" font-family="Arial, sans-serif" font-size="10" fill="#fff" text-anchor="end">IGN TOP25 &#183; 3534OT</text>

  <!-- Grid numbers top edge -->
  <text x="100" y="116" font-family="Arial, sans-serif" font-size="8" fill="#000">62</text>
  <text x="170" y="116" font-family="Arial, sans-serif" font-size="8" fill="#000">63</text>
  <text x="240" y="116" font-family="Arial, sans-serif" font-size="8" fill="#000">64</text>
  <text x="310" y="116" font-family="Arial, sans-serif" font-size="8" fill="#000">65</text>
  <text x="380" y="116" font-family="Arial, sans-serif" font-size="8" fill="#000">66</text>
  <text x="450" y="116" font-family="Arial, sans-serif" font-size="8" fill="#000">67</text>

  <!-- Grid lines -->
  <line x1="100" y1="120" x2="100" y2="380" stroke="#3a78a4" stroke-width="0.4"/>
  <line x1="170" y1="120" x2="170" y2="380" stroke="#3a78a4" stroke-width="0.4"/>
  <line x1="240" y1="120" x2="240" y2="380" stroke="#3a78a4" stroke-width="0.4"/>
  <line x1="310" y1="120" x2="310" y2="380" stroke="#3a78a4" stroke-width="0.4"/>
  <line x1="380" y1="120" x2="380" y2="380" stroke="#3a78a4" stroke-width="0.4"/>
  <line x1="450" y1="120" x2="450" y2="380" stroke="#3a78a4" stroke-width="0.4"/>

  <line x1="60" y1="150" x2="470" y2="150" stroke="#3a78a4" stroke-width="0.4"/>
  <line x1="60" y1="200" x2="470" y2="200" stroke="#3a78a4" stroke-width="0.4"/>
  <line x1="60" y1="250" x2="470" y2="250" stroke="#3a78a4" stroke-width="0.4"/>
  <line x1="60" y1="300" x2="470" y2="300" stroke="#3a78a4" stroke-width="0.4"/>
  <line x1="60" y1="350" x2="470" y2="350" stroke="#3a78a4" stroke-width="0.4"/>

  <!-- Grid numbers left edge -->
  <text x="70" y="155" font-family="Arial, sans-serif" font-size="8" fill="#000" text-anchor="end">68</text>
  <text x="70" y="205" font-family="Arial, sans-serif" font-size="8" fill="#000" text-anchor="end">67</text>
  <text x="70" y="255" font-family="Arial, sans-serif" font-size="8" fill="#000" text-anchor="end">66</text>
  <text x="70" y="305" font-family="Arial, sans-serif" font-size="8" fill="#000" text-anchor="end">65</text>
  <text x="70" y="355" font-family="Arial, sans-serif" font-size="8" fill="#000" text-anchor="end">64</text>

  <!-- Pretend map content: contours and a peak -->
  <ellipse cx="220" cy="220" rx="60" ry="35" fill="none" stroke="#B5651D" stroke-width="0.8"/>
  <ellipse cx="220" cy="220" rx="45" ry="25" fill="none" stroke="#B5651D" stroke-width="0.8"/>
  <ellipse cx="220" cy="220" rx="30" ry="15" fill="none" stroke="#B5651D" stroke-width="0.8"/>
  <ellipse cx="220" cy="220" rx="15" ry="8" fill="none" stroke="#B5651D" stroke-width="0.8"/>
  <polygon points="217,223 220,215 223,223" fill="#B5651D"/>
  <text x="240" y="223" font-family="Arial, sans-serif" font-size="7" fill="#000">2,548</text>

  <ellipse cx="370" cy="285" rx="50" ry="30" fill="none" stroke="#B5651D" stroke-width="0.8"/>
  <ellipse cx="370" cy="285" rx="35" ry="20" fill="none" stroke="#B5651D" stroke-width="0.8"/>
  <ellipse cx="370" cy="285" rx="20" ry="10" fill="none" stroke="#B5651D" stroke-width="0.8"/>

  <path d="M 110 360 Q 160 310 220 290 Q 280 270 320 310 Q 360 340 410 340" fill="none" stroke="#3a78a4" stroke-width="1.2"/>

  <!-- North arrow -->
  <g transform="translate(425,140)">
    <circle r="14" fill="#fff" stroke="#1a1a1a" stroke-width="0.8"/>
    <polygon points="-4,4 0,-10 4,4 0,1" fill="#1a1a1a"/>
    <text y="-14" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#000" text-anchor="middle">N</text>
  </g>

  <!-- Legend block bottom-left of map -->
  <rect x="50" y="390" width="180" height="50" fill="#f6f0e0" stroke="#1a1a1a" stroke-width="0.6"/>
  <text x="55" y="403" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#000">LEGEND</text>
  <rect x="55" y="410" width="8" height="2" fill="#B5651D"/>
  <text x="68" y="413" font-family="Arial, sans-serif" font-size="7" fill="#000">contour (10 m)</text>
  <line x1="55" y1="423" x2="63" y2="423" stroke="#3a78a4" stroke-width="1.2"/>
  <text x="68" y="426" font-family="Arial, sans-serif" font-size="7" fill="#000">river / stream</text>
  <rect x="55" y="432" width="6" height="4" fill="#1a1a1a"/>
  <text x="68" y="436" font-family="Arial, sans-serif" font-size="7" fill="#000">building / refuge</text>
  <text x="135" y="413" font-family="Arial, sans-serif" font-size="7" fill="#1a8a3a">&#9650;</text>
  <text x="145" y="413" font-family="Arial, sans-serif" font-size="7" fill="#000">summit</text>
  <line x1="135" y1="421" x2="143" y2="421" stroke="#1a1a1a" stroke-width="0.7" stroke-dasharray="2,1.5"/>
  <text x="148" y="424" font-family="Arial, sans-serif" font-size="7" fill="#000">footpath</text>

  <!-- Scale bar -->
  <rect x="270" y="405" width="60" height="6" fill="#1a1a1a"/>
  <rect x="270" y="405" width="20" height="6" fill="#fff" stroke="#1a1a1a" stroke-width="0.6"/>
  <rect x="290" y="405" width="20" height="6" fill="#1a1a1a"/>
  <rect x="310" y="405" width="20" height="6" fill="#fff" stroke="#1a1a1a" stroke-width="0.6"/>
  <text x="270" y="424" font-family="Arial, sans-serif" font-size="7" fill="#000">0</text>
  <text x="300" y="424" font-family="Arial, sans-serif" font-size="7" fill="#000" text-anchor="middle">500</text>
  <text x="330" y="424" font-family="Arial, sans-serif" font-size="7" fill="#000" text-anchor="middle">1,000 m</text>
  <text x="300" y="437" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#000" text-anchor="middle">Scale 1:25,000</text>

  <!-- Callout labels with leader lines -->
  <!-- title -->
  <text x="540" y="92" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#d32f2f">Title and series</text>
  <text x="540" y="106" font-family="Arial, sans-serif" font-size="8" fill="#444">Which area, which</text>
  <text x="540" y="117" font-family="Arial, sans-serif" font-size="8" fill="#444">map family.</text>
  <line x1="535" y1="93" x2="480" y2="88" stroke="#d32f2f" stroke-width="0.7" stroke-dasharray="2,2"/>

  <!-- north arrow -->
  <text x="540" y="155" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#d32f2f">North arrow</text>
  <text x="540" y="169" font-family="Arial, sans-serif" font-size="8" fill="#444">Which direction on</text>
  <text x="540" y="180" font-family="Arial, sans-serif" font-size="8" fill="#444">the sheet is north.</text>
  <line x1="535" y1="156" x2="440" y2="142" stroke="#d32f2f" stroke-width="0.7" stroke-dasharray="2,2"/>

  <!-- grid -->
  <text x="540" y="220" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#d32f2f">Grid lines and numbers</text>
  <text x="540" y="234" font-family="Arial, sans-serif" font-size="8" fill="#444">Numbered squares so</text>
  <text x="540" y="245" font-family="Arial, sans-serif" font-size="8" fill="#444">you can pinpoint a place.</text>
  <line x1="535" y1="221" x2="455" y2="215" stroke="#d32f2f" stroke-width="0.7" stroke-dasharray="2,2"/>

  <!-- legend -->
  <text x="540" y="290" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#d32f2f">Legend or key</text>
  <text x="540" y="304" font-family="Arial, sans-serif" font-size="8" fill="#444">What every symbol</text>
  <text x="540" y="315" font-family="Arial, sans-serif" font-size="8" fill="#444">and colour means.</text>
  <line x1="535" y1="291" x2="232" y2="400" stroke="#d32f2f" stroke-width="0.7" stroke-dasharray="2,2"/>

  <!-- scale -->
  <text x="540" y="365" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#d32f2f">Scale bar and statement</text>
  <text x="540" y="379" font-family="Arial, sans-serif" font-size="8" fill="#444">How map distance</text>
  <text x="540" y="390" font-family="Arial, sans-serif" font-size="8" fill="#444">converts to ground</text>
  <text x="540" y="401" font-family="Arial, sans-serif" font-size="8" fill="#444">distance.</text>
  <line x1="535" y1="366" x2="335" y2="420" stroke="#d32f2f" stroke-width="0.7" stroke-dasharray="2,2"/>

  <!-- Footer -->
  <text x="350" y="471" font-family="Arial, sans-serif" font-size="9" fill="#777" text-anchor="middle" font-style="italic">Same five elements on every alpine sheet, in roughly the same places. Find them before you start reading the map.</text>
</svg>
