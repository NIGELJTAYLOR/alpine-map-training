<svg viewBox="0 0 460 460" xmlns="http://www.w3.org/2000/svg">
  <rect width="460" height="460" fill="#fafaf5"/>
  <text x="20" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000">The eight-point compass rose</text>
  <text x="20" y="45" font-family="Arial, sans-serif" font-size="10" fill="#444">Cardinal (N, E, S, W) and intercardinal (NE, SE, SW, NW) directions, with bearings in degrees.</text>

  <circle cx="230" cy="240" r="170" fill="#fff" stroke="#888" stroke-width="0.8"/>
  <circle cx="230" cy="240" r="125" fill="none" stroke="#bbb" stroke-width="0.5" stroke-dasharray="3,3"/>

  <line x1="230" y1="240" x2="230" y2="80" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="225,90 230,72 235,90" fill="#1a1a1a"/>
  <line x1="230" y1="240" x2="343" y2="127" stroke="#888" stroke-width="1.2"/>
  <line x1="230" y1="240" x2="390" y2="240" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="380,235 397,240 380,245" fill="#1a1a1a"/>
  <line x1="230" y1="240" x2="343" y2="353" stroke="#888" stroke-width="1.2"/>
  <line x1="230" y1="240" x2="230" y2="400" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="225,390 230,407 235,390" fill="#1a1a1a"/>
  <line x1="230" y1="240" x2="117" y2="353" stroke="#888" stroke-width="1.2"/>
  <line x1="230" y1="240" x2="70" y2="240" stroke="#1a1a1a" stroke-width="2"/>
  <polygon points="80,235 63,240 80,245" fill="#1a1a1a"/>
  <line x1="230" y1="240" x2="117" y2="127" stroke="#888" stroke-width="1.2"/>

  <text x="230" y="64" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#000" text-anchor="middle">N</text>
  <text x="230" y="80" font-family="Arial, sans-serif" font-size="11" fill="#444" text-anchor="middle">000 / 360</text>

  <text x="354" y="120" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000">NE</text>
  <text x="354" y="134" font-family="Arial, sans-serif" font-size="11" fill="#444">045</text>

  <text x="408" y="244" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#000">E</text>
  <text x="408" y="258" font-family="Arial, sans-serif" font-size="11" fill="#444">090</text>

  <text x="354" y="378" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000">SE</text>
  <text x="354" y="392" font-family="Arial, sans-serif" font-size="11" fill="#444">135</text>

  <text x="230" y="425" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#000" text-anchor="middle">S</text>
  <text x="230" y="441" font-family="Arial, sans-serif" font-size="11" fill="#444" text-anchor="middle">180</text>

  <text x="84" y="378" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000" text-anchor="end">SW</text>
  <text x="84" y="392" font-family="Arial, sans-serif" font-size="11" fill="#444" text-anchor="end">225</text>

  <text x="50" y="244" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#000" text-anchor="end">W</text>
  <text x="50" y="258" font-family="Arial, sans-serif" font-size="11" fill="#444" text-anchor="end">270</text>

  <text x="84" y="120" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000" text-anchor="end">NW</text>
  <text x="84" y="134" font-family="Arial, sans-serif" font-size="11" fill="#444" text-anchor="end">315</text>

  <circle cx="230" cy="240" r="4" fill="#1a1a1a"/>
</svg>
