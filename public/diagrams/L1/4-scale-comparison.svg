<svg viewBox="0 0 620 380" xmlns="http://www.w3.org/2000/svg">
  <rect width="620" height="380" fill="#fafaf5"/>
  <text x="20" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000">The same area at two different scales</text>
  <text x="20" y="45" font-family="Arial, sans-serif" font-size="10" fill="#444">A larger-scale map (1:25,000) shows more detail. A smaller-scale map (1:50,000) shows a wider area with less detail.</text>
  <rect x="30" y="65" width="260" height="240" fill="#fff" stroke="#888" stroke-width="0.8" rx="4"/>
  <text x="160" y="87" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#000" text-anchor="middle">1:25,000  (1 cm = 250 m)</text>
  <path d="M 50 120 Q 100 110 160 115 Q 220 120 270 115" fill="none" stroke="#B5651D" stroke-width="1"/>
  <path d="M 50 135 Q 100 125 160 130 Q 220 135 270 130" fill="none" stroke="#B5651D" stroke-width="1"/>
  <path d="M 50 150 Q 100 140 160 145 Q 220 150 270 145" fill="none" stroke="#B5651D" stroke-width="1"/>
  <path d="M 50 165 Q 100 155 160 160 Q 220 165 270 160" fill="none" stroke="#B5651D" stroke-width="1"/>
  <path d="M 50 180 Q 100 170 160 175 Q 220 180 270 175" fill="none" stroke="#B5651D" stroke-width="1"/>
  <path d="M 50 200 Q 100 190 160 195 Q 220 200 270 195" fill="none" stroke="#B5651D" stroke-width="1"/>
  <path d="M 50 220 Q 100 210 160 215 Q 220 220 270 215" fill="none" stroke="#B5651D" stroke-width="1"/>
  <path d="M 70 250 Q 110 245 150 247 Q 190 249 250 250" fill="none" stroke="#1e88e5" stroke-width="1.4"/>
  <rect x="100" y="225" width="10" height="8" fill="#1a1a1a"/>
  <rect x="115" y="227" width="8" height="6" fill="#1a1a1a"/>
  <line x1="180" y1="200" x2="220" y2="240" stroke="#1a1a1a" stroke-width="0.8" stroke-dasharray="3,2"/>
  <polygon points="160,140 156,150 164,150" fill="#000"/>
  <text x="167" y="153" font-family="Arial, sans-serif" font-size="9" fill="#000">2,180</text>
  <line x1="50" y1="285" x2="160" y2="285" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="50" y1="280" x2="50" y2="290" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="105" y1="280" x2="105" y2="290" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="160" y1="280" x2="160" y2="290" stroke="#1a1a1a" stroke-width="1"/>
  <text x="50" y="300" font-family="Arial, sans-serif" font-size="9" fill="#000" text-anchor="middle">0</text>
  <text x="105" y="300" font-family="Arial, sans-serif" font-size="9" fill="#000" text-anchor="middle">500 m</text>
  <text x="160" y="300" font-family="Arial, sans-serif" font-size="9" fill="#000" text-anchor="middle">1 km</text>
  <rect x="330" y="65" width="260" height="240" fill="#fff" stroke="#888" stroke-width="0.8" rx="4"/>
  <text x="460" y="87" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#000" text-anchor="middle">1:50,000  (1 cm = 500 m)</text>
  <path d="M 360 130 Q 400 124 440 128 Q 480 132 510 130 Q 540 128 570 130" fill="none" stroke="#B5651D" stroke-width="1"/>
  <path d="M 360 145 Q 400 139 440 143 Q 480 147 510 145 Q 540 143 570 145" fill="none" stroke="#B5651D" stroke-width="1"/>
  <path d="M 360 165 Q 400 159 440 163 Q 480 167 510 165 Q 540 163 570 165" fill="none" stroke="#B5651D" stroke-width="1"/>
  <path d="M 360 185 Q 400 179 440 183 Q 480 187 510 185 Q 540 183 570 185" fill="none" stroke="#B5651D" stroke-width="1"/>
  <path d="M 360 215 Q 400 211 440 213 Q 480 215 510 213 Q 540 211 570 213" fill="none" stroke="#B5651D" stroke-width="1"/>
  <path d="M 380 245 Q 420 243 460 245 Q 500 247 540 246" fill="none" stroke="#1e88e5" stroke-width="1"/>
  <rect x="425" y="231" width="6" height="5" fill="#1a1a1a"/>
  <line x1="465" y1="218" x2="490" y2="240" stroke="#1a1a1a" stroke-width="0.6" stroke-dasharray="2,2"/>
  <polygon points="440,142 438,150 442,150" fill="#000"/>
  <text x="446" y="151" font-family="Arial, sans-serif" font-size="8" fill="#000">2,180</text>
  <line x1="380" y1="285" x2="490" y2="285" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="380" y1="280" x2="380" y2="290" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="435" y1="280" x2="435" y2="290" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="490" y1="280" x2="490" y2="290" stroke="#1a1a1a" stroke-width="1"/>
  <text x="380" y="300" font-family="Arial, sans-serif" font-size="9" fill="#000" text-anchor="middle">0</text>
  <text x="435" y="300" font-family="Arial, sans-serif" font-size="9" fill="#000" text-anchor="middle">500 m</text>
  <text x="490" y="300" font-family="Arial, sans-serif" font-size="9" fill="#000" text-anchor="middle">1 km</text>
  <text x="20" y="335" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">The two panels show the same ground area.</text>
  <text x="20" y="352" font-family="Arial, sans-serif" font-size="10" fill="#444">On 1:25,000 each contour, building, and stream is more easily distinguishable. On 1:50,000 the same features are smaller and</text>
  <text x="20" y="365" font-family="Arial, sans-serif" font-size="10" fill="#444">closer together. For detailed alpine route work, 1:25,000 is the standard. For overview planning, 1:50,000 is sometimes preferred.</text>
</svg>
