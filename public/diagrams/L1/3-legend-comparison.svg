<svg viewBox="0 0 600 360" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="360" fill="#fafaf5"/>
  <text x="20" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000">Legend comparison: same feature, different conventions</text>
  <text x="20" y="45" font-family="Arial, sans-serif" font-size="10" fill="#444">Stylised side-by-side. Two maps may show the same feature differently. The lesson is to check the legend, not to assume.</text>

  <rect x="30" y="65" width="260" height="270" fill="#fff" stroke="#888" stroke-width="0.8" rx="4"/>
  <rect x="310" y="65" width="260" height="270" fill="#fff" stroke="#888" stroke-width="0.8" rx="4"/>

  <text x="160" y="87" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#000" text-anchor="middle">Series A (e.g. IGN TOP25)</text>
  <text x="440" y="87" font-family="Arial, sans-serif" font-size="12" font-weight="bold" fill="#000" text-anchor="middle">Series B (e.g. Swisstopo)</text>
  <line x1="40" y1="95" x2="280" y2="95" stroke="#444" stroke-width="0.6"/>
  <line x1="320" y1="95" x2="560" y2="95" stroke="#444" stroke-width="0.6"/>

  <text x="45" y="120" font-family="Arial, sans-serif" font-size="11" fill="#000">Walking route</text>
  <line x1="180" y1="116" x2="270" y2="116" stroke="#d32f2f" stroke-width="1.4" stroke-dasharray="4,2"/>
  <text x="325" y="120" font-family="Arial, sans-serif" font-size="11" fill="#000">Walking route</text>
  <line x1="460" y1="116" x2="550" y2="116" stroke="#1a1a1a" stroke-width="1.2" stroke-dasharray="2,2"/>

  <text x="45" y="153" font-family="Arial, sans-serif" font-size="11" fill="#000">Refuge / hut</text>
  <rect x="200" y="145" width="14" height="10" fill="#1a1a1a"/>
  <text x="220" y="153" font-family="Arial, sans-serif" font-size="10" fill="#444">named</text>
  <text x="325" y="153" font-family="Arial, sans-serif" font-size="11" fill="#000">Refuge / hut</text>
  <polygon points="475,143 470,153 480,153" fill="#1a1a1a"/>
  <rect x="473" y="146" width="6" height="6" fill="#fafaf5"/>
  <text x="490" y="153" font-family="Arial, sans-serif" font-size="10" fill="#444">named</text>

  <text x="45" y="186" font-family="Arial, sans-serif" font-size="11" fill="#000">Contour interval</text>
  <text x="200" y="186" font-family="Arial, sans-serif" font-size="11" fill="#000">10 m</text>
  <text x="325" y="186" font-family="Arial, sans-serif" font-size="11" fill="#000">Contour interval</text>
  <text x="460" y="186" font-family="Arial, sans-serif" font-size="11" fill="#000">20 m</text>

  <text x="45" y="219" font-family="Arial, sans-serif" font-size="11" fill="#000">Glacier</text>
  <rect x="180" y="208" width="90" height="14" fill="#cfe7f0" stroke="#1e88e5" stroke-width="0.6"/>
  <path d="M 188 215 Q 200 213 212 215" fill="none" stroke="#1e88e5" stroke-width="0.6"/>
  <path d="M 235 215 Q 247 213 259 215" fill="none" stroke="#1e88e5" stroke-width="0.6"/>
  <text x="325" y="219" font-family="Arial, sans-serif" font-size="11" fill="#000">Glacier</text>
  <rect x="460" y="208" width="90" height="14" fill="#dde7ec" stroke="#7da0a9" stroke-width="0.6"/>
  <text x="464" y="219" font-family="Arial, sans-serif" font-size="9" fill="#7da0a9">crevasse hatching</text>

  <text x="45" y="252" font-family="Arial, sans-serif" font-size="11" fill="#000">Cliff face</text>
  <line x1="180" y1="247" x2="270" y2="247" stroke="#1a1a1a" stroke-width="2"/>
  <line x1="184" y1="247" x2="184" y2="253" stroke="#1a1a1a" stroke-width="0.6"/>
  <line x1="194" y1="247" x2="194" y2="253" stroke="#1a1a1a" stroke-width="0.6"/>
  <line x1="204" y1="247" x2="204" y2="253" stroke="#1a1a1a" stroke-width="0.6"/>
  <line x1="214" y1="247" x2="214" y2="253" stroke="#1a1a1a" stroke-width="0.6"/>
  <line x1="224" y1="247" x2="224" y2="253" stroke="#1a1a1a" stroke-width="0.6"/>
  <line x1="234" y1="247" x2="234" y2="253" stroke="#1a1a1a" stroke-width="0.6"/>
  <line x1="244" y1="247" x2="244" y2="253" stroke="#1a1a1a" stroke-width="0.6"/>
  <line x1="254" y1="247" x2="254" y2="253" stroke="#1a1a1a" stroke-width="0.6"/>
  <line x1="264" y1="247" x2="264" y2="253" stroke="#1a1a1a" stroke-width="0.6"/>
  <text x="325" y="252" font-family="Arial, sans-serif" font-size="11" fill="#000">Cliff face</text>
  <rect x="460" y="244" width="90" height="10" fill="#9e6f3a" opacity="0.7"/>
  <text x="464" y="269" font-family="Arial, sans-serif" font-size="9" fill="#7a5530">brown rock shading</text>

  <text x="45" y="298" font-family="Arial, sans-serif" font-size="11" fill="#000">Marked summit</text>
  <polygon points="200,290 196,300 204,300" fill="#000"/>
  <text x="210" y="300" font-family="Arial, sans-serif" font-size="9" fill="#000">2,847</text>
  <text x="325" y="298" font-family="Arial, sans-serif" font-size="11" fill="#000">Marked summit</text>
  <text x="460" y="295" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a">▲</text>
  <text x="478" y="300" font-family="Arial, sans-serif" font-size="9" fill="#000">2,847</text>

  <text x="20" y="355" font-family="Arial, sans-serif" font-size="9" fill="#777" font-style="italic">Stylised generic series. Specific publishers vary; the principle is the same — read the legend before reading the map.</text>
</svg>
