<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="480" fill="#fafaf5"/>
  <text x="20" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000">Three line types on the same slope</text>
  <text x="20" y="45" font-family="Arial, sans-serif" font-size="10" fill="#444">A 300 m climb between A at the bottom and B at the top, contours uniform at 4 mm spacing (about 14&#176; on a 1:25,000 sheet with 10 m intervals).</text>
  <text x="20" y="60" font-family="Arial, sans-serif" font-size="10" fill="#444">Direct, contour-following and zig-zag lines all reach B; they differ in length, gradient and kick-turn placement.</text>

  <!-- Three panels -->
  <!-- Common contour pattern function helper not possible in SVG; replicate per panel -->

  <!-- Panel 1: Direct -->
  <g transform="translate(30,80)">
    <rect width="210" height="320" fill="#ffffff" stroke="#444" stroke-width="0.8"/>
    <!-- contours horizontal, uniform spacing -->
    <line x1="10" y1="40" x2="200" y2="40" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="70" x2="200" y2="70" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="100" x2="200" y2="100" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="130" x2="200" y2="130" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="160" x2="200" y2="160" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="190" x2="200" y2="190" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="220" x2="200" y2="220" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="250" x2="200" y2="250" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="280" x2="200" y2="280" stroke="#B5651D" stroke-width="0.9"/>

    <text x="15" y="37" font-family="Arial, sans-serif" font-size="7" fill="#B5651D">2,100</text>
    <text x="15" y="277" font-family="Arial, sans-serif" font-size="7" fill="#B5651D">1,800</text>

    <!-- Direct line -->
    <line x1="105" y1="290" x2="105" y2="30" stroke="#d32f2f" stroke-width="2.5"/>
    <polygon points="100,38 105,25 110,38" fill="#d32f2f"/>

    <!-- A and B markers -->
    <circle cx="105" cy="290" r="5" fill="#1a8a3a"/>
    <text x="105" y="305" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1a8a3a" text-anchor="middle">A</text>
    <circle cx="105" cy="25" r="5" fill="#1a8a3a"/>
    <text x="120" y="22" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1a8a3a">B</text>

    <text x="105" y="10" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000" text-anchor="middle">Direct</text>
  </g>
  <text x="135" y="415" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#000" text-anchor="middle">Direct line</text>
  <text x="135" y="430" font-family="Arial, sans-serif" font-size="8" fill="#444" text-anchor="middle">1,200 m length, ~14&#176;</text>
  <text x="135" y="443" font-family="Arial, sans-serif" font-size="8" fill="#d32f2f" text-anchor="middle">sustained at the upper</text>
  <text x="135" y="455" font-family="Arial, sans-serif" font-size="8" fill="#d32f2f" text-anchor="middle">limit; tiring on a skin track.</text>

  <!-- Panel 2: Contour-following -->
  <g transform="translate(255,80)">
    <rect width="210" height="320" fill="#ffffff" stroke="#444" stroke-width="0.8"/>
    <line x1="10" y1="40" x2="200" y2="40" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="70" x2="200" y2="70" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="100" x2="200" y2="100" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="130" x2="200" y2="130" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="160" x2="200" y2="160" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="190" x2="200" y2="190" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="220" x2="200" y2="220" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="250" x2="200" y2="250" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="280" x2="200" y2="280" stroke="#B5651D" stroke-width="0.9"/>

    <!-- Contour-following: round to side then up at end -->
    <path d="M 105 290 Q 60 280 35 245 Q 25 200 35 130 Q 50 70 100 35 L 105 30" fill="none" stroke="#d32f2f" stroke-width="2.5"/>
    <polygon points="98,36 105,25 110,40" fill="#d32f2f"/>

    <circle cx="105" cy="290" r="5" fill="#1a8a3a"/>
    <text x="105" y="305" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1a8a3a" text-anchor="middle">A</text>
    <circle cx="105" cy="25" r="5" fill="#1a8a3a"/>
    <text x="120" y="22" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1a8a3a">B</text>

    <text x="105" y="10" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000" text-anchor="middle">Contour-following</text>
  </g>
  <text x="360" y="415" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#000" text-anchor="middle">Contour-following</text>
  <text x="360" y="430" font-family="Arial, sans-serif" font-size="8" fill="#444" text-anchor="middle">Round to one side then up.</text>
  <text x="360" y="443" font-family="Arial, sans-serif" font-size="8" fill="#444" text-anchor="middle">Long but gentle on the traverse.</text>
  <text x="360" y="455" font-family="Arial, sans-serif" font-size="8" fill="#444" text-anchor="middle">Used to enter or exit a feature.</text>

  <!-- Panel 3: Zig-zag -->
  <g transform="translate(480,80)">
    <rect width="210" height="320" fill="#ffffff" stroke="#444" stroke-width="0.8"/>
    <line x1="10" y1="40" x2="200" y2="40" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="70" x2="200" y2="70" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="100" x2="200" y2="100" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="130" x2="200" y2="130" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="160" x2="200" y2="160" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="190" x2="200" y2="190" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="220" x2="200" y2="220" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="250" x2="200" y2="250" stroke="#B5651D" stroke-width="0.9"/>
    <line x1="10" y1="280" x2="200" y2="280" stroke="#B5651D" stroke-width="0.9"/>

    <!-- Zig-zag with kick turns -->
    <polyline points="105,290 35,230 180,170 35,110 105,30" fill="none" stroke="#d32f2f" stroke-width="2.5"/>
    <polygon points="98,36 105,25 110,40" fill="#d32f2f"/>

    <!-- kick turn markers -->
    <circle cx="35" cy="230" r="4.5" fill="#fff" stroke="#d32f2f" stroke-width="1.5"/>
    <text x="42" y="234" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#d32f2f">1</text>
    <circle cx="180" cy="170" r="4.5" fill="#fff" stroke="#d32f2f" stroke-width="1.5"/>
    <text x="170" y="162" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#d32f2f">2</text>
    <circle cx="35" cy="110" r="4.5" fill="#fff" stroke="#d32f2f" stroke-width="1.5"/>
    <text x="42" y="114" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#d32f2f">3</text>

    <circle cx="105" cy="290" r="5" fill="#1a8a3a"/>
    <text x="105" y="305" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1a8a3a" text-anchor="middle">A</text>
    <circle cx="105" cy="25" r="5" fill="#1a8a3a"/>
    <text x="120" y="22" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1a8a3a">B</text>

    <text x="105" y="10" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000" text-anchor="middle">Zig-zag (3 kick turns)</text>
  </g>
  <text x="585" y="415" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#1a8a3a" text-anchor="middle">Zig-zag</text>
  <text x="585" y="430" font-family="Arial, sans-serif" font-size="8" fill="#444" text-anchor="middle">~2,000 m skin-track length,</text>
  <text x="585" y="443" font-family="Arial, sans-serif" font-size="8" fill="#444" text-anchor="middle">~8&#8211;9&#176; on each traverse.</text>
  <text x="585" y="455" font-family="Arial, sans-serif" font-size="8" fill="#444" text-anchor="middle">Kick turns on the gentlest ground.</text>

  <!-- Footer -->
  <text x="350" y="473" font-family="Arial, sans-serif" font-size="9" fill="#777" text-anchor="middle" font-style="italic">Comfortable skinning band: 8 to 12&#176;. Above 15&#176; sustained, switch line type.</text>
</svg>
