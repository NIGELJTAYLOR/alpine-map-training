<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="480" fill="#fafaf5"/>
  <text x="20" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000">C5.2 contour snippet sheet</text>
  <text x="20" y="45" font-family="Arial, sans-serif" font-size="10" fill="#444">Six 1:25,000 patterns (10 m contours) numbered 1 to 6. Match each to one of the six aerial / oblique photographs (A to F) supplied by your trainer.</text>

  <!-- Snippet 1: sharp peak -->
  <g transform="translate(30,75)">
    <rect width="200" height="170" fill="#ffffff" stroke="#444" stroke-width="0.8"/>
    <text x="10" y="15" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">1</text>
    <ellipse cx="100" cy="95" rx="80" ry="55" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <ellipse cx="100" cy="95" rx="62" ry="42" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <ellipse cx="100" cy="95" rx="46" ry="30" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <ellipse cx="100" cy="95" rx="30" ry="18" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <ellipse cx="100" cy="95" rx="14" ry="8" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <polygon points="96,98 100,88 104,98" fill="#B5651D"/>
    <text x="110" y="100" font-family="Arial, sans-serif" font-size="7" fill="#000">3,140</text>
    <rect x="0" y="150" width="20" height="3" fill="#000"/>
    <text x="10" y="165" font-family="Arial, sans-serif" font-size="6.5" fill="#000" text-anchor="middle">500 m</text>
  </g>

  <!-- Snippet 2: bowl with single exit -->
  <g transform="translate(250,75)">
    <rect width="200" height="170" fill="#ffffff" stroke="#444" stroke-width="0.8"/>
    <text x="10" y="15" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">2</text>
    <path d="M 30 50 Q 60 25 100 25 Q 140 25 170 50" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <path d="M 35 75 Q 65 50 100 50 Q 135 50 165 75" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <path d="M 40 95 Q 70 75 100 75 Q 130 75 160 95" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <path d="M 45 115 Q 75 100 100 100 Q 125 100 155 115" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <path d="M 55 135 L 85 135 M 115 135 L 145 135" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <text x="60" y="142" font-family="Arial, sans-serif" font-size="9" fill="#1a1a1a">&#9698;</text>
    <text x="130" y="142" font-family="Arial, sans-serif" font-size="9" fill="#1a1a1a">&#9698;</text>
    <rect x="0" y="150" width="20" height="3" fill="#000"/>
    <text x="10" y="165" font-family="Arial, sans-serif" font-size="6.5" fill="#000" text-anchor="middle">500 m</text>
  </g>

  <!-- Snippet 3: convex roll into gully -->
  <g transform="translate(470,75)">
    <rect width="200" height="170" fill="#ffffff" stroke="#444" stroke-width="0.8"/>
    <text x="10" y="15" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">3</text>
    <path d="M 10 35 Q 100 32 190 35" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <path d="M 10 55 Q 100 50 190 55" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <path d="M 10 75 Q 100 68 190 75" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <!-- Convex roll: spacing tightens -->
    <path d="M 10 90 Q 100 78 190 90" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <path d="M 10 100 Q 100 87 190 100" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <!-- Gully forms below: V-up tight -->
    <path d="M 10 115 Q 70 122 100 105 Q 130 122 190 115" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <path d="M 10 130 Q 70 138 100 120 Q 130 138 190 130" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <text x="78" y="135" font-family="Arial, sans-serif" font-size="9" fill="#1a1a1a">&#9698;</text>
    <text x="116" y="135" font-family="Arial, sans-serif" font-size="9" fill="#1a1a1a">&#9698;</text>
    <rect x="0" y="150" width="20" height="3" fill="#000"/>
    <text x="10" y="165" font-family="Arial, sans-serif" font-size="6.5" fill="#000" text-anchor="middle">500 m</text>
  </g>

  <!-- Snippet 4: spur off a ridge -->
  <g transform="translate(30,260)">
    <rect width="200" height="170" fill="#ffffff" stroke="#444" stroke-width="0.8"/>
    <text x="10" y="15" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">4</text>
    <!-- ridge horizontal at top, spur descending V-down -->
    <path d="M 10 35 Q 60 40 100 40 Q 140 40 190 35" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <path d="M 10 60 Q 50 70 100 80 Q 150 70 190 60" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <path d="M 10 85 Q 50 100 100 115 Q 150 100 190 85" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <path d="M 10 110 Q 50 130 100 145 Q 150 130 190 110" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <text x="95" y="35" font-family="Arial, sans-serif" font-size="7" fill="#777">ridge</text>
    <text x="92" y="155" font-family="Arial, sans-serif" font-size="7" fill="#777">spur</text>
    <rect x="0" y="150" width="20" height="3" fill="#000"/>
    <text x="10" y="165" font-family="Arial, sans-serif" font-size="6.5" fill="#000" text-anchor="middle">500 m</text>
  </g>

  <!-- Snippet 5: col / saddle -->
  <g transform="translate(250,260)">
    <rect width="200" height="170" fill="#ffffff" stroke="#444" stroke-width="0.8"/>
    <text x="10" y="15" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">5</text>
    <ellipse cx="40" cy="50" rx="30" ry="20" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <ellipse cx="40" cy="50" rx="18" ry="12" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <ellipse cx="160" cy="50" rx="30" ry="20" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <ellipse cx="160" cy="50" rx="18" ry="12" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <!-- saddle between -->
    <path d="M 60 80 Q 100 90 140 80" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <path d="M 50 105 Q 100 110 150 105" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <path d="M 40 130 Q 100 135 160 130" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <text x="40" y="40" font-family="Arial, sans-serif" font-size="7" fill="#000" text-anchor="middle">2,560</text>
    <text x="160" y="40" font-family="Arial, sans-serif" font-size="7" fill="#000" text-anchor="middle">2,610</text>
    <text x="100" y="100" font-family="Arial, sans-serif" font-size="8" fill="#d32f2f" text-anchor="middle">col</text>
    <rect x="0" y="150" width="20" height="3" fill="#000"/>
    <text x="10" y="165" font-family="Arial, sans-serif" font-size="6.5" fill="#000" text-anchor="middle">500 m</text>
  </g>

  <!-- Snippet 6: plateau with cliff edge -->
  <g transform="translate(470,260)">
    <rect width="200" height="170" fill="#ffffff" stroke="#444" stroke-width="0.8"/>
    <text x="10" y="15" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">6</text>
    <!-- broad flat top, no contours inside -->
    <ellipse cx="100" cy="65" rx="80" ry="38" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <text x="100" y="68" font-family="Arial, sans-serif" font-size="7" fill="#000" text-anchor="middle">spot 2,210</text>
    <!-- cliff band on the south side -->
    <rect x="20" y="110" width="160" height="6" fill="#B5651D" opacity="0.6"/>
    <text x="40" y="115" font-family="Arial, sans-serif" font-size="10" fill="#1a1a1a">&#9698;&#9698;&#9698;</text>
    <text x="120" y="115" font-family="Arial, sans-serif" font-size="10" fill="#1a1a1a">&#9698;&#9698;&#9698;</text>
    <path d="M 10 130 Q 100 135 190 130" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <path d="M 10 145 Q 100 148 190 145" fill="none" stroke="#B5651D" stroke-width="0.9"/>
    <rect x="0" y="155" width="20" height="3" fill="#000"/>
    <text x="10" y="167" font-family="Arial, sans-serif" font-size="6.5" fill="#000" text-anchor="middle">500 m</text>
  </g>

  <!-- Footer -->
  <text x="350" y="470" font-family="Arial, sans-serif" font-size="9" fill="#777" text-anchor="middle" font-style="italic">Pair each snippet with one of the trainer-supplied photographs A to F. Note the visual cue you used for each match.</text>
</svg>
