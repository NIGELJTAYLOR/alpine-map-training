<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="420" fill="#fafaf5"/>
  <text x="20" y="30" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#000">Aspect-of-slope relocation: the four-stage procedure</text>
  <text x="40" y="65" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">Stage 1: take a compass bearing down the fall line</text>
  <path d="M 80 90 Q 200 100 320 90" fill="none" stroke="#B5651D" stroke-width="1.2"/>
  <path d="M 80 110 Q 200 120 320 110" fill="none" stroke="#B5651D" stroke-width="1.2"/>
  <path d="M 80 130 Q 200 140 320 130" fill="none" stroke="#B5651D" stroke-width="1.2"/>
  <path d="M 80 150 Q 200 160 320 150" fill="none" stroke="#B5651D" stroke-width="1.2"/>
  <circle cx="200" cy="120" r="5" fill="#000"/>
  <text x="208" y="124" font-family="Arial, sans-serif" font-size="9" fill="#000">candidate</text>
  <line x1="200" y1="120" x2="200" y2="170" stroke="#d32f2f" stroke-width="2"/>
  <polygon points="195,165 200,175 205,165" fill="#d32f2f"/>
  <text x="208" y="170" font-family="Arial, sans-serif" font-size="10" fill="#d32f2f">fall line: 092° magnetic</text>
  <text x="380" y="80" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">Stage 2: subtract variation</text>
  <text x="395" y="98" font-family="Arial, sans-serif" font-size="10" fill="#000">Magnetic 092°</text>
  <text x="395" y="113" font-family="Arial, sans-serif" font-size="10" fill="#000">Variation +2° east</text>
  <text x="395" y="128" font-family="Arial, sans-serif" font-size="10" fill="#444">Mag - var = grid</text>
  <text x="395" y="143" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#d32f2f">Grid bearing 090°</text>
  <text x="40" y="220" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">Stage 3: place the bearing on the map perpendicular to contours</text>
  <path d="M 80 250 Q 200 245 320 240" fill="none" stroke="#B5651D" stroke-width="1.2"/>
  <path d="M 80 275 Q 200 270 320 265" fill="none" stroke="#B5651D" stroke-width="1.2"/>
  <path d="M 80 300 Q 200 295 320 290" fill="none" stroke="#B5651D" stroke-width="1.2"/>
  <path d="M 80 325 Q 200 320 320 315" fill="none" stroke="#B5651D" stroke-width="1.2"/>
  <path d="M 80 350 Q 200 345 320 340" fill="none" stroke="#B5651D" stroke-width="1.2"/>
  <line x1="100" y1="295" x2="320" y2="295" stroke="#d32f2f" stroke-width="2" stroke-dasharray="4,3"/>
  <polygon points="315,290 325,295 315,300" fill="#d32f2f"/>
  <text x="115" y="290" font-family="Arial, sans-serif" font-size="10" fill="#d32f2f">grid 090° (perpendicular to contours)</text>
  <text x="380" y="220" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">Stage 4: read altimeter</text>
  <text x="395" y="240" font-family="Arial, sans-serif" font-size="10" fill="#000">Altimeter reads 2,250 m</text>
  <text x="395" y="255" font-family="Arial, sans-serif" font-size="10" fill="#444">Find the 2,250 m contour</text>
  <text x="395" y="270" font-family="Arial, sans-serif" font-size="10" fill="#444">where the bearing crosses it.</text>
  <text x="395" y="295" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#d32f2f">Position = intersection.</text>
  <circle cx="200" cy="295" r="6" fill="#d32f2f" opacity="0.4"/>
  <circle cx="200" cy="295" r="3" fill="#d32f2f"/>
  <text x="395" y="320" font-family="Arial, sans-serif" font-size="10" fill="#444">The aspect (slope direction)</text>
  <text x="395" y="333" font-family="Arial, sans-serif" font-size="10" fill="#444">+ the altitude (contour) =</text>
  <text x="395" y="346" font-family="Arial, sans-serif" font-size="10" fill="#444">unique position.</text>
  <text x="20" y="395" font-family="Arial, sans-serif" font-size="10" fill="#444">Working under good conditions: complete in under 2 minutes (IMS / EMS standard).</text>
  <text x="20" y="410" font-family="Arial, sans-serif" font-size="10" fill="#444">Fails on: curving slopes, ambiguous aspect, very flat ground, uncalibrated altimeter.</text>
</svg>