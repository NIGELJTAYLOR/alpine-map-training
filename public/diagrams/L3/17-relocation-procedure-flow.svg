<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="480" fill="#fafaf5"/>
  <text x="20" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000">Systematic relocation: the eight-step procedure</text>
  <text x="20" y="45" font-family="Arial, sans-serif" font-size="10" fill="#444">Temporarily unsure of position. Stop. Work through the procedure calmly. Resume only when the position is confirmed.</text>

  <!-- 8 step boxes in 4x2 grid -->
  <g font-family="Arial, sans-serif" fill="#000">
    <!-- Step 1: Stop (red) -->
    <rect x="30" y="70" width="155" height="80" fill="#fff4d6" stroke="#d4a23a" stroke-width="1.4" rx="4"/>
    <circle cx="50" cy="92" r="11" fill="#d32f2f"/>
    <text x="50" y="96" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">1</text>
    <text x="68" y="90" font-size="10" font-weight="bold">STOP</text>
    <text x="68" y="106" font-size="8" fill="#444">Do not keep walking.</text>
    <text x="40" y="125" font-size="8" fill="#444">Continuing moves you further</text>
    <text x="40" y="135" font-size="8" fill="#444">from the last known point.</text>

    <!-- Step 2: Mark -->
    <rect x="195" y="70" width="155" height="80" fill="#fff4d6" stroke="#d4a23a" stroke-width="1.4" rx="4"/>
    <circle cx="215" cy="92" r="11" fill="#d32f2f"/>
    <text x="215" y="96" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">2</text>
    <text x="233" y="90" font-size="10" font-weight="bold">MARK POSITION</text>
    <text x="233" y="106" font-size="8" fill="#444">GPS waypoint (backup).</text>
    <text x="205" y="125" font-size="8" fill="#444">Mental snapshot of where</text>
    <text x="205" y="135" font-size="8" fill="#444">you are at this moment.</text>

    <!-- Step 3: Last position + time -->
    <rect x="360" y="70" width="155" height="80" fill="#eef2f3" stroke="#3a78a4" stroke-width="1.4" rx="4"/>
    <circle cx="380" cy="92" r="11" fill="#3a78a4"/>
    <text x="380" y="96" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">3</text>
    <text x="398" y="90" font-size="10" font-weight="bold">LAST + TIME</text>
    <text x="398" y="106" font-size="8" fill="#444">Last confirmed waypoint</text>
    <text x="370" y="125" font-size="8" fill="#444">and elapsed time. Sets the</text>
    <text x="370" y="135" font-size="8" fill="#444">search area.</text>

    <!-- Step 4: Fall-line bearing -->
    <rect x="525" y="70" width="155" height="80" fill="#eef2f3" stroke="#3a78a4" stroke-width="1.4" rx="4"/>
    <circle cx="545" cy="92" r="11" fill="#3a78a4"/>
    <text x="545" y="96" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">4</text>
    <text x="563" y="90" font-size="10" font-weight="bold">FALL-LINE BEARING</text>
    <text x="563" y="106" font-size="8" fill="#444">Aspect of current slope.</text>
    <text x="535" y="125" font-size="8" fill="#444">Use the D7.2 technique:</text>
    <text x="535" y="135" font-size="8" fill="#444">perpendicular to contour.</text>

    <!-- Step 5: Match to map -->
    <rect x="525" y="200" width="155" height="80" fill="#eef2f3" stroke="#3a78a4" stroke-width="1.4" rx="4"/>
    <circle cx="545" cy="222" r="11" fill="#3a78a4"/>
    <text x="545" y="226" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">5</text>
    <text x="563" y="220" font-size="10" font-weight="bold">MATCH TO MAP</text>
    <text x="563" y="236" font-size="8" fill="#444">Slopes with this aspect</text>
    <text x="535" y="255" font-size="8" fill="#444">in the search area.</text>
    <text x="535" y="265" font-size="8" fill="#444">Probably 2 or 3 candidates.</text>

    <!-- Step 6: Altimeter -->
    <rect x="360" y="200" width="155" height="80" fill="#eef2f3" stroke="#3a78a4" stroke-width="1.4" rx="4"/>
    <circle cx="380" cy="222" r="11" fill="#3a78a4"/>
    <text x="380" y="226" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">6</text>
    <text x="398" y="220" font-size="10" font-weight="bold">ALTIMETER</text>
    <text x="398" y="236" font-size="8" fill="#444">The altitude reading</text>
    <text x="370" y="255" font-size="8" fill="#444">refines to a unique point</text>
    <text x="370" y="265" font-size="8" fill="#444">on the matching slope.</text>

    <!-- Step 7: Confirm with feature -->
    <rect x="195" y="200" width="155" height="80" fill="#eef2f3" stroke="#3a78a4" stroke-width="1.4" rx="4"/>
    <circle cx="215" cy="222" r="11" fill="#3a78a4"/>
    <text x="215" y="226" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">7</text>
    <text x="233" y="220" font-size="10" font-weight="bold">CONFIRM</text>
    <text x="233" y="236" font-size="8" fill="#444">Any visible feature as</text>
    <text x="205" y="255" font-size="8" fill="#444">cross-check. Even one</text>
    <text x="205" y="265" font-size="8" fill="#444">rock or colour change.</text>

    <!-- Step 8: Plan next leg -->
    <rect x="30" y="200" width="155" height="80" fill="#dde9d6" stroke="#1a8a3a" stroke-width="1.4" rx="4"/>
    <circle cx="50" cy="222" r="11" fill="#1a8a3a"/>
    <text x="50" y="226" font-size="11" font-weight="bold" fill="#fff" text-anchor="middle">8</text>
    <text x="68" y="220" font-size="10" font-weight="bold">PLAN NEXT LEG</text>
    <text x="68" y="236" font-size="8" fill="#444">From the new fix.</text>
    <text x="40" y="255" font-size="8" fill="#444">Resume the route only</text>
    <text x="40" y="265" font-size="8" fill="#444">once position confirmed.</text>
  </g>

  <!-- Connecting arrows -->
  <g stroke="#1a1a1a" stroke-width="1.4" fill="#1a1a1a">
    <line x1="185" y1="110" x2="190" y2="110"/><polygon points="187,106 197,110 187,114"/>
    <line x1="350" y1="110" x2="355" y2="110"/><polygon points="352,106 362,110 352,114"/>
    <line x1="515" y1="110" x2="520" y2="110"/><polygon points="517,106 527,110 517,114"/>
    <line x1="600" y1="150" x2="600" y2="195"/><polygon points="596,193 600,203 604,193"/>
    <line x1="525" y1="240" x2="520" y2="240"/><polygon points="523,236 513,240 523,244"/>
    <line x1="360" y1="240" x2="355" y2="240"/><polygon points="358,236 348,240 358,244"/>
    <line x1="195" y1="240" x2="190" y2="240"/><polygon points="193,236 183,240 193,244"/>
  </g>

  <!-- Leadership / language box -->
  <rect x="30" y="305" width="640" height="80" fill="#fff4d6" stroke="#d4a23a" stroke-width="1.2"/>
  <text x="350" y="324" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#000" text-anchor="middle">Communication to the group</text>
  <text x="350" y="342" font-family="Arial, sans-serif" font-size="9" fill="#000" text-anchor="middle">&#8220;I am temporarily unsure of position. I am stopping to relocate.&#8221;</text>
  <text x="350" y="356" font-family="Arial, sans-serif" font-size="9" fill="#444" text-anchor="middle">&#8220;The last confirmed point was [X], approximately [Y] minutes ago. I expect to relocate within a few minutes.&#8221;</text>
  <text x="350" y="370" font-family="Arial, sans-serif" font-size="9" fill="#444" text-anchor="middle">&#8220;In the meantime, please stay together at this point.&#8221;</text>

  <!-- Footer note -->
  <text x="350" y="410" font-family="Arial, sans-serif" font-size="9" fill="#777" text-anchor="middle" font-style="italic">Typical time: 2 to 5 minutes. Faster than the cost of continuing on a wrong bearing.</text>
  <text x="350" y="425" font-family="Arial, sans-serif" font-size="9" fill="#777" text-anchor="middle" font-style="italic">Calm, systematic relocation is the IMS / EMS-relevant skill, not the avoidance of all uncertainty.</text>
  <text x="350" y="440" font-family="Arial, sans-serif" font-size="9" fill="#777" text-anchor="middle" font-style="italic">Avoid &#8220;lost&#8221;: it is not professional language and it signals no plan.</text>
</svg>
