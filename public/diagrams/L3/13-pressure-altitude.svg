<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="480" fill="#fafaf5"/>
  <text x="20" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000">Pressure and altitude: the 1 hPa = 8 m rule</text>
  <text x="20" y="45" font-family="Arial, sans-serif" font-size="10" fill="#444">A barometric altimeter measures pressure and converts it to altitude using a standard-atmosphere model.</text>
  <text x="20" y="60" font-family="Arial, sans-serif" font-size="10" fill="#444">In the lower troposphere (the alpine range), pressure drops by about 1 hPa for every 8 m of altitude gain.</text>

  <!-- Vertical scale: pressure left, altitude right -->
  <line x1="180" y1="100" x2="180" y2="430" stroke="#1a1a1a" stroke-width="1.6"/>
  <line x1="450" y1="100" x2="450" y2="430" stroke="#1a1a1a" stroke-width="1.6"/>

  <!-- Mountain backdrop -->
  <polygon points="200,430 250,330 290,360 340,250 390,290 430,200 460,230 510,180 540,210 600,140 630,180 660,160 660,430" fill="#dfd4b6" stroke="#8a7a5a" stroke-width="0.6" opacity="0.7"/>

  <!-- Altitude labels (right side) -->
  <g font-family="Arial, sans-serif" font-size="9" fill="#000">
    <text x="455" y="105" font-weight="bold">m</text>
    <line x1="445" y1="115" x2="455" y2="115" stroke="#1a1a1a" stroke-width="0.9"/>
    <text x="458" y="118">3,000</text>
    <line x1="445" y1="170" x2="455" y2="170" stroke="#1a1a1a" stroke-width="0.9"/>
    <text x="458" y="173">2,500</text>
    <line x1="445" y1="225" x2="455" y2="225" stroke="#1a1a1a" stroke-width="0.9"/>
    <text x="458" y="228">2,000</text>
    <line x1="445" y1="280" x2="455" y2="280" stroke="#1a1a1a" stroke-width="0.9"/>
    <text x="458" y="283">1,500</text>
    <line x1="445" y1="335" x2="455" y2="335" stroke="#1a1a1a" stroke-width="0.9"/>
    <text x="458" y="338">1,000</text>
    <line x1="445" y1="390" x2="455" y2="390" stroke="#1a1a1a" stroke-width="0.9"/>
    <text x="458" y="393">500</text>
    <line x1="445" y1="425" x2="455" y2="425" stroke="#1a1a1a" stroke-width="0.9"/>
    <text x="458" y="428">0 (sea level)</text>
  </g>

  <!-- Pressure labels (left side) -->
  <g font-family="Arial, sans-serif" font-size="9" fill="#000">
    <text x="125" y="105" font-weight="bold" text-anchor="end">hPa</text>
    <line x1="175" y1="115" x2="185" y2="115" stroke="#1a1a1a" stroke-width="0.9"/>
    <text x="170" y="118" text-anchor="end">~700</text>
    <line x1="175" y1="170" x2="185" y2="170" stroke="#1a1a1a" stroke-width="0.9"/>
    <text x="170" y="173" text-anchor="end">~750</text>
    <line x1="175" y1="225" x2="185" y2="225" stroke="#1a1a1a" stroke-width="0.9"/>
    <text x="170" y="228" text-anchor="end">~795</text>
    <line x1="175" y1="280" x2="185" y2="280" stroke="#1a1a1a" stroke-width="0.9"/>
    <text x="170" y="283" text-anchor="end">~845</text>
    <line x1="175" y1="335" x2="185" y2="335" stroke="#1a1a1a" stroke-width="0.9"/>
    <text x="170" y="338" text-anchor="end">~898</text>
    <line x1="175" y1="390" x2="185" y2="390" stroke="#1a1a1a" stroke-width="0.9"/>
    <text x="170" y="393" text-anchor="end">~955</text>
    <line x1="175" y1="425" x2="185" y2="425" stroke="#1a1a1a" stroke-width="0.9"/>
    <text x="170" y="428" text-anchor="end">1013</text>
  </g>

  <!-- Rule-of-thumb callout: 1 hPa per 8 m -->
  <rect x="240" y="150" width="200" height="60" fill="#fff4d6" stroke="#d4a23a" stroke-width="1.2"/>
  <text x="340" y="170" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000" text-anchor="middle">Rule of thumb</text>
  <text x="340" y="187" font-family="Arial, sans-serif" font-size="10" fill="#000" text-anchor="middle">1 hPa drop &#8776; 8 m of climb</text>
  <text x="340" y="201" font-family="Arial, sans-serif" font-size="8" fill="#444" text-anchor="middle">(lower troposphere; alpine range)</text>

  <!-- Worked example annotation: 1 hPa = 8 m segment -->
  <line x1="195" y1="280" x2="195" y2="287" stroke="#d32f2f" stroke-width="2"/>
  <text x="200" y="285" font-family="Arial, sans-serif" font-size="8" fill="#d32f2f">8 m</text>
  <text x="240" y="285" font-family="Arial, sans-serif" font-size="8" fill="#d32f2f">&#8776; 1 hPa</text>

  <!-- Footer caveat -->
  <text x="350" y="450" font-family="Arial, sans-serif" font-size="9" fill="#777" text-anchor="middle" font-style="italic">Pressure changes from passing weather move the altimeter too. Always recalibrate at known-altitude points.</text>
  <text x="350" y="465" font-family="Arial, sans-serif" font-size="9" fill="#777" text-anchor="middle" font-style="italic">GPS altimeters do not drift with weather but depend on satellite signal and battery; the IMS / EMS standard is the barometric model with regular recalibration.</text>
</svg>
