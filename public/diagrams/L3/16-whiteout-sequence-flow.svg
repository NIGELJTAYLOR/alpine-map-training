<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="480" fill="#fafaf5"/>
  <text x="20" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000">The IMS Nav Programme whiteout sequence</text>
  <text x="20" y="45" font-family="Arial, sans-serif" font-size="10" fill="#444">Visibility has dropped mid-tour. Stop. Use the route card you prepared in good conditions. Execute, do not improvise.</text>

  <!-- 6 step boxes -->
  <g font-family="Arial, sans-serif" fill="#000">
    <!-- Step 1 -->
    <rect x="40" y="85" width="180" height="80" fill="#fff4d6" stroke="#d4a23a" stroke-width="1.4" rx="4"/>
    <circle cx="65" cy="108" r="13" fill="#d32f2f"/>
    <text x="65" y="113" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">1</text>
    <text x="85" y="105" font-size="11" font-weight="bold">STOP</text>
    <text x="85" y="125" font-size="9" fill="#444">Resist the instinct to</text>
    <text x="85" y="138" font-size="9" fill="#444">keep moving. Stop first.</text>
    <text x="50" y="156" font-size="8" fill="#777" font-style="italic">first reaction matters</text>

    <!-- Step 2 -->
    <rect x="260" y="85" width="180" height="80" fill="#fff4d6" stroke="#d4a23a" stroke-width="1.4" rx="4"/>
    <circle cx="285" cy="108" r="13" fill="#d32f2f"/>
    <text x="285" y="113" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">2</text>
    <text x="305" y="105" font-size="11" font-weight="bold">CLUSTER</text>
    <text x="305" y="125" font-size="9" fill="#444">Bring the group together,</text>
    <text x="305" y="138" font-size="9" fill="#444">all within arm&#8217;s reach.</text>
    <text x="270" y="156" font-size="8" fill="#777" font-style="italic">no scattered members</text>

    <!-- Step 3 -->
    <rect x="480" y="85" width="180" height="80" fill="#eef2f3" stroke="#3a78a4" stroke-width="1.4" rx="4"/>
    <circle cx="505" cy="108" r="13" fill="#3a78a4"/>
    <text x="505" y="113" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">3</text>
    <text x="525" y="105" font-size="11" font-weight="bold">LAST POSITION</text>
    <text x="525" y="125" font-size="9" fill="#444">Confirm the last known</text>
    <text x="525" y="138" font-size="9" fill="#444">waypoint on the route card.</text>
    <text x="490" y="156" font-size="8" fill="#777" font-style="italic">route card = the truth</text>

    <!-- Step 4 -->
    <rect x="480" y="225" width="180" height="80" fill="#eef2f3" stroke="#3a78a4" stroke-width="1.4" rx="4"/>
    <circle cx="505" cy="248" r="13" fill="#3a78a4"/>
    <text x="505" y="253" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">4</text>
    <text x="525" y="245" font-size="11" font-weight="bold">BEARING</text>
    <text x="525" y="265" font-size="9" fill="#444">Pre-calculated bearing to</text>
    <text x="525" y="278" font-size="9" fill="#444">next waypoint, from route card.</text>
    <text x="490" y="296" font-size="8" fill="#777" font-style="italic">do not re-derive</text>

    <!-- Step 5 -->
    <rect x="260" y="225" width="180" height="80" fill="#eef2f3" stroke="#3a78a4" stroke-width="1.4" rx="4"/>
    <circle cx="285" cy="248" r="13" fill="#3a78a4"/>
    <text x="285" y="253" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">5</text>
    <text x="305" y="245" font-size="11" font-weight="bold">ALTITUDE</text>
    <text x="305" y="265" font-size="9" fill="#444">Target altitude noted, from</text>
    <text x="305" y="278" font-size="9" fill="#444">route card. Altimeter ready.</text>
    <text x="270" y="296" font-size="8" fill="#777" font-style="italic">arrival check</text>

    <!-- Step 6 -->
    <rect x="40" y="225" width="180" height="80" fill="#dde9d6" stroke="#1a8a3a" stroke-width="1.4" rx="4"/>
    <circle cx="65" cy="248" r="13" fill="#1a8a3a"/>
    <text x="65" y="253" font-size="13" font-weight="bold" fill="#fff" text-anchor="middle">6</text>
    <text x="85" y="245" font-size="11" font-weight="bold">MOVE</text>
    <text x="85" y="265" font-size="9" fill="#444">Move forward on bearing,</text>
    <text x="85" y="278" font-size="9" fill="#444">group together, altitude check.</text>
    <text x="50" y="296" font-size="8" fill="#777" font-style="italic">execute mechanically</text>
  </g>

  <!-- Connecting arrows -->
  <g stroke="#1a1a1a" stroke-width="1.5" fill="#1a1a1a">
    <line x1="220" y1="125" x2="255" y2="125"/>
    <polygon points="252,121 262,125 252,129"/>
    <line x1="440" y1="125" x2="475" y2="125"/>
    <polygon points="472,121 482,125 472,129"/>
    <line x1="570" y1="165" x2="570" y2="220"/>
    <polygon points="566,218 570,228 574,218"/>
    <line x1="475" y1="265" x2="445" y2="265"/>
    <polygon points="448,261 438,265 448,269"/>
    <line x1="255" y1="265" x2="225" y2="265"/>
    <polygon points="228,261 218,265 228,269"/>
  </g>

  <!-- Pre-condition reminder -->
  <rect x="40" y="345" width="620" height="55" fill="#fff4d6" stroke="#d4a23a" stroke-width="1.2"/>
  <text x="350" y="365" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#000" text-anchor="middle">The route card is the prerequisite.</text>
  <text x="350" y="381" font-family="Arial, sans-serif" font-size="9" fill="#444" text-anchor="middle">All five &#8220;information&#8221; steps (3, 4, 5) refer to the card you prepared in good conditions at your desk.</text>
  <text x="350" y="394" font-family="Arial, sans-serif" font-size="9" fill="#444" text-anchor="middle">A candidate with no route card has nothing reliable to fall back on; that is the worst position to be in.</text>

  <!-- Scope note -->
  <text x="350" y="425" font-family="Arial, sans-serif" font-size="9" fill="#777" text-anchor="middle">In scope for IMS / EMS: managing visibility drops encountered en route.</text>
  <text x="350" y="440" font-family="Arial, sans-serif" font-size="9" fill="#777" text-anchor="middle">Out of scope: deliberately setting out in zero visibility.</text>
</svg>
