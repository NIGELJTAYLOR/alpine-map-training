<svg viewBox="0 0 600 380" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="380" fill="#fafaf5"/>
  <line x1="40" y1="320" x2="560" y2="320" stroke="#444" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="40" y="340" font-family="Arial, sans-serif" font-size="10" fill="#444">horizontal reference</text>
  <polygon points="60,320 540,320 540,140" fill="#e8e2d5" stroke="#888" stroke-width="1.5"/>
  <text x="50" y="270" font-family="Arial, sans-serif" font-size="11" fill="#444">snow / ground surface</text>
  <text x="200" y="200" font-family="Arial, sans-serif" font-size="10" fill="#444">slope (cross-section view)</text>
  <line x1="280" y1="245" x2="430" y2="190" stroke="#000" stroke-width="3"/>
  <line x1="282" y1="247" x2="276" y2="240" stroke="#000" stroke-width="2.5"/>
  <text x="220" y="232" font-family="Arial, sans-serif" font-size="10" fill="#000">compass held edge-on to slope</text>
  <path d="M 280 245 A 30 30 0 0 0 310 245" fill="none" stroke="#d32f2f" stroke-width="1.5"/>
  <text x="288" y="262" font-family="Arial, sans-serif" font-size="10" fill="#d32f2f" font-weight="bold">θ</text>
  <text x="320" y="290" font-family="Arial, sans-serif" font-size="11" fill="#d32f2f" font-weight="bold">slope angle θ = 32°</text>
  <text x="320" y="305" font-family="Arial, sans-serif" font-size="9" fill="#444">(read from inclinometer scale on bezel)</text>
  <text x="40" y="40" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">Inclinometer use:</text>
  <text x="40" y="56" font-family="Arial, sans-serif" font-size="10" fill="#444">1. Hold compass edge-on to slope surface, body pointing down the fall line.</text>
  <text x="40" y="70" font-family="Arial, sans-serif" font-size="10" fill="#444">2. Read the angle from the inclinometer scale (built into the bezel).</text>
  <text x="40" y="84" font-family="Arial, sans-serif" font-size="10" fill="#444">3. Cross-reference with the C1.2 contour-spacing estimate.</text>
  <text x="40" y="98" font-family="Arial, sans-serif" font-size="10" fill="#444">4. For a convex roll, take three measurements (top, rollover, below) to detect the pattern.</text>
  <text x="40" y="112" font-family="Arial, sans-serif" font-size="10" fill="#444">5. Slopes at or above 30° are in the avalanche release range.</text>
</svg>