<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="480" fill="#fafaf5"/>
  <text x="20" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000">Resection: position fix from two visible features</text>
  <text x="20" y="45" font-family="Arial, sans-serif" font-size="10" fill="#444">Take a magnetic bearing to each feature; convert to grid; calculate the back bearing; plot from each feature; your position is where the lines cross.</text>

  <!-- Map background -->
  <rect x="30" y="65" width="510" height="380" fill="#ffffff" stroke="#444" stroke-width="0.8"/>
  <!-- Grid -->
  <g stroke="#3a78a4" stroke-width="0.3" opacity="0.7">
    <line x1="100" y1="65" x2="100" y2="445"/>
    <line x1="180" y1="65" x2="180" y2="445"/>
    <line x1="260" y1="65" x2="260" y2="445"/>
    <line x1="340" y1="65" x2="340" y2="445"/>
    <line x1="420" y1="65" x2="420" y2="445"/>
    <line x1="500" y1="65" x2="500" y2="445"/>
    <line x1="30" y1="120" x2="540" y2="120"/>
    <line x1="30" y1="180" x2="540" y2="180"/>
    <line x1="30" y1="240" x2="540" y2="240"/>
    <line x1="30" y1="300" x2="540" y2="300"/>
    <line x1="30" y1="360" x2="540" y2="360"/>
    <line x1="30" y1="420" x2="540" y2="420"/>
  </g>

  <!-- Contour pattern: peak (top-left), valley (bottom-right) -->
  <g stroke="#B5651D" fill="none" stroke-width="0.7" opacity="0.85">
    <ellipse cx="140" cy="160" rx="80" ry="55"/>
    <ellipse cx="140" cy="160" rx="60" ry="40"/>
    <ellipse cx="140" cy="160" rx="40" ry="25"/>
    <ellipse cx="140" cy="160" rx="22" ry="13"/>
    <ellipse cx="140" cy="160" rx="9" ry="5"/>
  </g>
  <polygon points="136,162 140,154 144,162" fill="#B5651D"/>
  <text x="148" y="163" font-family="Arial, sans-serif" font-size="7" fill="#000">2,950</text>
  <text x="148" y="173" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#000">Feature A</text>

  <!-- Hut (bottom-right) -->
  <rect x="438" y="378" width="9" height="7" fill="#1a1a1a"/>
  <text x="455" y="385" font-family="Arial, sans-serif" font-size="7" fill="#000">Refuge 2,200</text>
  <text x="455" y="395" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#000">Feature B</text>

  <!-- A few faint contours through the valley -->
  <g stroke="#B5651D" fill="none" stroke-width="0.5" opacity="0.6">
    <path d="M 230 260 Q 290 280 370 290 Q 430 295 510 280"/>
    <path d="M 230 310 Q 290 330 370 340 Q 430 345 510 330"/>
    <path d="M 230 360 Q 290 380 370 390 Q 430 395 510 380"/>
  </g>

  <!-- Candidate position -->
  <circle cx="290" cy="280" r="7" fill="#1a8a3a" stroke="#fff" stroke-width="1.4"/>
  <text x="298" y="270" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#1a8a3a">YOU</text>

  <!-- Back-bearing line from Feature A -->
  <line x1="140" y1="160" x2="370" y2="350" stroke="#d32f2f" stroke-width="1.4"/>
  <text x="200" y="200" font-family="Arial, sans-serif" font-size="8" fill="#d32f2f" transform="rotate(40 200 200)">back bearing 130&#176;</text>
  <text x="200" y="212" font-family="Arial, sans-serif" font-size="7" fill="#d32f2f" transform="rotate(40 200 212)">(bearing to A was 310; +/-180 = 130)</text>

  <!-- Back-bearing line from Feature B -->
  <line x1="442" y1="380" x2="180" y2="240" stroke="#d32f2f" stroke-width="1.4"/>
  <text x="380" y="320" font-family="Arial, sans-serif" font-size="8" fill="#d32f2f" transform="rotate(-28 380 320)">back bearing 223&#176;</text>
  <text x="380" y="332" font-family="Arial, sans-serif" font-size="7" fill="#d32f2f" transform="rotate(-28 380 332)">(bearing to B was 043; +180 = 223)</text>

  <!-- North arrow -->
  <g transform="translate(515,90)">
    <circle r="11" fill="#fff" stroke="#1a1a1a" stroke-width="0.8"/>
    <polygon points="-3,3 0,-8 3,3 0,0" fill="#1a1a1a"/>
    <text y="-13" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#000" text-anchor="middle">N</text>
  </g>

  <!-- Right side: procedure summary -->
  <rect x="555" y="65" width="125" height="380" fill="#f6f0e0" stroke="#1a1a1a" stroke-width="0.7"/>
  <text x="617" y="85" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#000" text-anchor="middle">Procedure</text>

  <text x="565" y="110" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#000">Step 1</text>
  <text x="565" y="123" font-family="Arial, sans-serif" font-size="8" fill="#444">Bearing to A: 312 mag.</text>
  <text x="565" y="135" font-family="Arial, sans-serif" font-size="8" fill="#444">Grid 310 (var +2).</text>

  <text x="565" y="158" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#000">Step 2</text>
  <text x="565" y="171" font-family="Arial, sans-serif" font-size="8" fill="#444">Bearing to B: 045 mag.</text>
  <text x="565" y="183" font-family="Arial, sans-serif" font-size="8" fill="#444">Grid 043 (var +2).</text>

  <text x="565" y="206" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#000">Step 3</text>
  <text x="565" y="219" font-family="Arial, sans-serif" font-size="8" fill="#444">Back-bearings:</text>
  <text x="565" y="231" font-family="Arial, sans-serif" font-size="8" fill="#444">A: 310 &#8722; 180 = 130.</text>
  <text x="565" y="243" font-family="Arial, sans-serif" font-size="8" fill="#444">B: 043 + 180 = 223.</text>

  <text x="565" y="266" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#000">Step 4</text>
  <text x="565" y="279" font-family="Arial, sans-serif" font-size="8" fill="#444">Plot 130 from A,</text>
  <text x="565" y="291" font-family="Arial, sans-serif" font-size="8" fill="#444">plot 223 from B.</text>
  <text x="565" y="303" font-family="Arial, sans-serif" font-size="8" fill="#444">Lines cross at YOU.</text>

  <rect x="563" y="320" width="113" height="55" fill="#fff4d6" stroke="#d4a23a" stroke-width="0.7"/>
  <text x="617" y="338" font-family="Arial, sans-serif" font-size="8" font-weight="bold" fill="#000" text-anchor="middle">Best accuracy</text>
  <text x="617" y="351" font-family="Arial, sans-serif" font-size="7" fill="#444" text-anchor="middle">when A and B are</text>
  <text x="617" y="363" font-family="Arial, sans-serif" font-size="7" fill="#444" text-anchor="middle">~90&#176; apart as seen</text>
  <text x="617" y="372" font-family="Arial, sans-serif" font-size="7" fill="#444" text-anchor="middle">from your position.</text>

  <text x="617" y="395" font-family="Arial, sans-serif" font-size="7" fill="#777" text-anchor="middle" font-style="italic">A 3rd bearing produces</text>
  <text x="617" y="406" font-family="Arial, sans-serif" font-size="7" fill="#777" text-anchor="middle" font-style="italic">a &#8220;cocked hat&#8221;; centre</text>
  <text x="617" y="417" font-family="Arial, sans-serif" font-size="7" fill="#777" text-anchor="middle" font-style="italic">is the best fix.</text>

  <text x="617" y="435" font-family="Arial, sans-serif" font-size="7" font-weight="bold" fill="#d32f2f" text-anchor="middle">Needs good visibility.</text>
</svg>
