<svg viewBox="0 0 700 320" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="320" fill="#fafaf5"/>
  <text x="50" y="30" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#000">Square (4 × 90°)</text>
  <polygon points="60,80 180,80 180,200 60,200" fill="none" stroke="#1e88e5" stroke-width="2"/>
  <circle cx="60" cy="200" r="5" fill="#000"/>
  <text x="35" y="218" font-family="Arial, sans-serif" font-size="10" fill="#000">start</text>
  <circle cx="68" cy="195" r="5" fill="#d32f2f"/>
  <text x="78" y="195" font-family="Arial, sans-serif" font-size="10" fill="#d32f2f">end (closure error)</text>
  <line x1="60" y1="200" x2="68" y2="195" stroke="#d32f2f" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="80" y="135" font-family="Arial, sans-serif" font-size="9" fill="#444">100 paces</text>
  <text x="100" y="75" font-family="Arial, sans-serif" font-size="9" fill="#444">90°</text>
  <text x="50" y="270" font-family="Arial, sans-serif" font-size="10" fill="#444">closure error: under 5 paces</text>
  <text x="50" y="283" font-family="Arial, sans-serif" font-size="10" fill="#444">at IMS / EMS standard.</text>
  <text x="270" y="30" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#000">Triangle (3 × 120°)</text>
  <polygon points="280,200 380,200 330,113" fill="none" stroke="#1e88e5" stroke-width="2"/>
  <circle cx="280" cy="200" r="5" fill="#000"/>
  <text x="255" y="218" font-family="Arial, sans-serif" font-size="10" fill="#000">start</text>
  <circle cx="288" cy="206" r="5" fill="#d32f2f"/>
  <text x="298" y="218" font-family="Arial, sans-serif" font-size="10" fill="#d32f2f">end</text>
  <line x1="280" y1="200" x2="288" y2="206" stroke="#d32f2f" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="320" y="218" font-family="Arial, sans-serif" font-size="9" fill="#444">100 paces / side</text>
  <text x="270" y="270" font-family="Arial, sans-serif" font-size="10" fill="#444">harder than the square:</text>
  <text x="270" y="283" font-family="Arial, sans-serif" font-size="10" fill="#444">120° turns are less intuitive.</text>
  <text x="500" y="30" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#000">Hexagon (6 × 60°)</text>
  <polygon points="510,150 540,90 600,90 630,150 600,210 540,210" fill="none" stroke="#1e88e5" stroke-width="2"/>
  <circle cx="540" cy="210" r="5" fill="#000"/>
  <text x="515" y="228" font-family="Arial, sans-serif" font-size="10" fill="#000">start</text>
  <circle cx="546" cy="216" r="5" fill="#d32f2f"/>
  <text x="555" y="228" font-family="Arial, sans-serif" font-size="10" fill="#d32f2f">end</text>
  <line x1="540" y1="210" x2="546" y2="216" stroke="#d32f2f" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="500" y="270" font-family="Arial, sans-serif" font-size="10" fill="#444">gentler than the square:</text>
  <text x="500" y="283" font-family="Arial, sans-serif" font-size="10" fill="#444">small turns, more sides to average.</text>
  <text x="50" y="310" font-family="Arial, sans-serif" font-size="10" fill="#444">All three diagrams show a small closure error (red); a perfect drill would have start and end coincident.</text>
</svg>