<svg viewBox="0 0 600 380" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="380" fill="#fafaf5"/>
  <ellipse cx="300" cy="200" rx="270" ry="160" fill="#f0eee5" stroke="none"/>
  <text x="200" y="60" font-family="Arial, sans-serif" font-size="10" fill="#888">visibility approximately 5 m (whiteout)</text>
  <circle cx="120" cy="280" r="14" fill="#1e88e5"/>
  <text x="100" y="320" font-family="Arial, sans-serif" font-size="10" fill="#000" font-weight="bold">lead navigator</text>
  <text x="105" y="333" font-family="Arial, sans-serif" font-size="9" fill="#444">(holds pole + cord end)</text>
  <line x1="125" y1="275" x2="180" y2="225" stroke="#444" stroke-width="2.5"/>
  <text x="155" y="265" font-family="Arial, sans-serif" font-size="9" fill="#444">ski pole</text>
  <line x1="180" y1="225" x2="350" y2="115" stroke="#666" stroke-width="1.5"/>
  <text x="225" y="180" font-family="Arial, sans-serif" font-size="9" fill="#666">cord (5 to 6 m, lying on snow)</text>
  <text x="225" y="193" font-family="Arial, sans-serif" font-size="9" fill="#666">in direction of travel</text>
  <circle cx="365" cy="105" r="14" fill="#388e3c"/>
  <text x="375" y="95" font-family="Arial, sans-serif" font-size="10" fill="#000" font-weight="bold">scout</text>
  <text x="375" y="108" font-family="Arial, sans-serif" font-size="9" fill="#444">(at end of cord)</text>
  <line x1="380" y1="100" x2="430" y2="80" stroke="#d32f2f" stroke-width="2"/>
  <polygon points="425,77 435,80 425,84" fill="#d32f2f"/>
  <text x="440" y="80" font-family="Arial, sans-serif" font-size="10" fill="#d32f2f">bearing direction</text>
  <text x="40" y="35" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="#000">Pole-and-cord (extreme low visibility, terrain hazards):</text>
  <text x="40" y="55" font-family="Arial, sans-serif" font-size="10" fill="#444">Three conditions all required: visibility &lt; 5 to 10 m; hidden hazard present; need to move.</text>
  <text x="40" y="350" font-family="Arial, sans-serif" font-size="10" fill="#444">Procedure: scout walks forward on bearing → stops at cord end → lead joins scout → repeat.</text>
  <text x="40" y="365" font-family="Arial, sans-serif" font-size="10" fill="#444">Cord serves three functions: direction confirmation, physical extension, drop detection.</text>
</svg>