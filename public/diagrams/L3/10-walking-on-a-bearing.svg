<svg viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg">
  <rect width="700" height="480" fill="#fafaf5"/>
  <text x="20" y="28" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="#000">Walking on a bearing: sequential aiming points</text>
  <text x="20" y="45" font-family="Arial, sans-serif" font-size="10" fill="#444">Set the bearing once; pick a feature on the line at the maximum visible distance; walk to it; pick the next one. Repeat.</text>

  <!-- Top-down terrain view -->
  <rect x="30" y="65" width="640" height="320" fill="#f1efe6" stroke="#444" stroke-width="0.8"/>

  <!-- Faint contours -->
  <path d="M 30 105 Q 200 95 400 115 Q 540 125 670 110" fill="none" stroke="#B5651D" stroke-width="0.6" opacity="0.6"/>
  <path d="M 30 145 Q 200 140 400 155 Q 540 165 670 150" fill="none" stroke="#B5651D" stroke-width="0.6" opacity="0.6"/>
  <path d="M 30 185 Q 200 180 400 195 Q 540 205 670 190" fill="none" stroke="#B5651D" stroke-width="0.6" opacity="0.6"/>
  <path d="M 30 225 Q 200 220 400 235 Q 540 245 670 230" fill="none" stroke="#B5651D" stroke-width="0.6" opacity="0.6"/>
  <path d="M 30 265 Q 200 260 400 275 Q 540 285 670 270" fill="none" stroke="#B5651D" stroke-width="0.6" opacity="0.6"/>
  <path d="M 30 305 Q 200 300 400 315 Q 540 325 670 310" fill="none" stroke="#B5651D" stroke-width="0.6" opacity="0.6"/>
  <path d="M 30 345 Q 200 340 400 355 Q 540 365 670 350" fill="none" stroke="#B5651D" stroke-width="0.6" opacity="0.6"/>

  <!-- Bearing line: from start (left) to destination (right) -->
  <line x1="80" y1="290" x2="620" y2="160" stroke="#d32f2f" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Start point: candidate -->
  <circle cx="80" cy="290" r="7" fill="#1a8a3a"/>
  <polygon points="76,288 80,278 84,288" fill="#1a8a3a"/>
  <text x="80" y="312" font-family="Arial, sans-serif" font-size="9" fill="#1a8a3a" font-weight="bold" text-anchor="middle">start</text>
  <text x="80" y="324" font-family="Arial, sans-serif" font-size="8" fill="#1a8a3a" text-anchor="middle">candidate, set bearing</text>

  <!-- Aiming point 1: a rock outcrop -->
  <g transform="translate(220,255)">
    <polygon points="-8,5 -4,-8 4,-9 8,3 0,7" fill="#7a6a5a" stroke="#3a2a1a" stroke-width="0.7"/>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="8" fill="#000" text-anchor="middle">rock outcrop</text>
    <text x="0" y="32" font-family="Arial, sans-serif" font-size="7" fill="#1a8a3a" text-anchor="middle">aiming point 1</text>
  </g>

  <!-- Aiming point 2: a lone tree -->
  <g transform="translate(360,220)">
    <line x1="0" y1="0" x2="0" y2="-12" stroke="#3a2a1a" stroke-width="1.5"/>
    <circle cx="0" cy="-14" r="6" fill="#3e5028"/>
    <text x="0" y="20" font-family="Arial, sans-serif" font-size="8" fill="#000" text-anchor="middle">lone tree</text>
    <text x="0" y="32" font-family="Arial, sans-serif" font-size="7" fill="#1a8a3a" text-anchor="middle">aiming point 2</text>
  </g>

  <!-- Aiming point 3: a snow bench / cornice edge -->
  <g transform="translate(500,185)">
    <path d="M -14 0 Q 0 -10 14 0" fill="#f5f5f5" stroke="#666" stroke-width="0.8"/>
    <text x="0" y="14" font-family="Arial, sans-serif" font-size="8" fill="#000" text-anchor="middle">snow feature</text>
    <text x="0" y="26" font-family="Arial, sans-serif" font-size="7" fill="#1a8a3a" text-anchor="middle">aiming point 3</text>
  </g>

  <!-- Destination -->
  <circle cx="620" cy="160" r="7" fill="#1a8a3a"/>
  <text x="620" y="148" font-family="Arial, sans-serif" font-size="9" fill="#1a8a3a" font-weight="bold" text-anchor="middle">destination</text>

  <!-- Distance brackets for each leg -->
  <text x="150" y="280" font-family="Arial, sans-serif" font-size="7" fill="#777" text-anchor="middle">leg 1</text>
  <text x="290" y="245" font-family="Arial, sans-serif" font-size="7" fill="#777" text-anchor="middle">leg 2</text>
  <text x="430" y="210" font-family="Arial, sans-serif" font-size="7" fill="#777" text-anchor="middle">leg 3</text>
  <text x="560" y="178" font-family="Arial, sans-serif" font-size="7" fill="#777" text-anchor="middle">leg 4</text>

  <!-- Pictorial compass top-right -->
  <g transform="translate(625,90)">
    <rect x="-30" y="-22" width="60" height="44" fill="#eef2f3" stroke="#666" stroke-width="0.8"/>
    <circle r="14" fill="#fff" stroke="#666" stroke-width="0.7"/>
    <polygon points="-3,-3 3,-3 0,-10" fill="#d32f2f"/>
    <line x1="-4" y1="-3" x2="-4" y2="10" stroke="#d32f2f" stroke-width="0.7"/>
    <line x1="4" y1="-3" x2="4" y2="10" stroke="#d32f2f" stroke-width="0.7"/>
    <polygon points="0,-3 -3,8 0,6 3,8" fill="#d32f2f"/>
    <text x="0" y="-15" font-family="Arial, sans-serif" font-size="6" fill="#000" text-anchor="middle">N</text>
  </g>
  <text x="625" y="125" font-family="Arial, sans-serif" font-size="7" fill="#000" text-anchor="middle">bearing on bezel</text>

  <!-- Steps panel at the bottom -->
  <text x="30" y="410" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#000">Steps in the field</text>
  <text x="30" y="425" font-family="Arial, sans-serif" font-size="9" fill="#444">1. Hold the compass flat. Rotate your body until the needle sits in the orienting arrow. The direction-of-travel arrow now points along the bearing.</text>
  <text x="30" y="438" font-family="Arial, sans-serif" font-size="9" fill="#444">2. Look up. Pick a distinctive feature on that line at the maximum visible distance.</text>
  <text x="30" y="451" font-family="Arial, sans-serif" font-size="9" fill="#444">3. Put the compass away. Walk to the feature.</text>
  <text x="30" y="464" font-family="Arial, sans-serif" font-size="9" fill="#444">4. When you reach it, take the compass out, re-orient, pick the next aiming point. Repeat until the destination.</text>
</svg>
